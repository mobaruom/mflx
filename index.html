<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusFlow - Ultimate Productivity App</title>

<!-- PWA MANIFEST INLINE -->
<link rel="manifest" id="manifestPlaceholder">

<style>
/* ===============================
   RESET + BASE
================================ */
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui}
body{
    background:#0f172a;
    color:white;
    min-height:100vh;
}

/* ===============================
   LAYOUT
================================ */
header{
    padding:20px;
    background:#020617;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #1e293b;
}

.container{padding:20px;max-width:1200px;margin:auto}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:#020617;
    padding:20px;
    border-radius:15px;
    border:1px solid #1e293b;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

h1{font-size:22px}
h2{margin-bottom:10px}

button{
    background:#22c55e;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    color:white;
    margin:5px;
}
button:hover{opacity:.8}

input,textarea{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #334155;
    background:#020617;
    color:white;
    margin-top:5px;
}

.task{
    background:#020617;
    padding:10px;
    border-radius:10px;
    border:1px solid #334155;
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.completed{text-decoration:line-through;opacity:.5}

footer{
    text-align:center;
    padding:20px;
    opacity:.6;
}
</style>
</head>

<body>

<header>
    <h1>🚀 FocusFlow</h1>
    <div>
        <button onclick="toggleDark()">🌙</button>
        <button onclick="exportData()">💾 Export</button>
        <button onclick="importData()">📂 Import</button>
    </div>
</header>

<div class="container">
<div class="grid">

<!-- TASK MANAGER -->
<div class="card">
<h2>📋 Tasks</h2>
<input id="taskInput" placeholder="New task...">
<button onclick="addTask()">Add Task</button>
<div id="taskList"></div>
</div>

<!-- PROJECTS -->
<div class="card">
<h2>📁 Projects</h2>
<input id="projectInput" placeholder="New project...">
<button onclick="addProject()">Add Project</button>
<div id="projectList"></div>
</div>

<!-- NOTES -->
<div class="card">
<h2>📝 Notes</h2>
<textarea id="noteInput" rows="5"></textarea>
<button onclick="saveNote()">Save Note</button>
<div id="notesList"></div>
</div>

<!-- STATS -->
<div class="card">
<h2>📊 Stats</h2>
<p id="stats"></p>
</div>

</div>
</div>

<footer>Offline Ready • Installable App • Local Database</footer>

<script>
/* ===============================
   DATABASE (LOCAL STORAGE)
================================ */
let DB = JSON.parse(localStorage.getItem("focusflowDB")) || {
    tasks:[],
    projects:[],
    notes:[]
}

function saveDB(){
    localStorage.setItem("focusflowDB", JSON.stringify(DB))
    renderAll()
}

/* ===============================
   TASKS
================================ */
function addTask(){
    let text=document.getElementById("taskInput").value
    if(!text)return
    DB.tasks.push({id:Date.now(),text,done:false})
    document.getElementById("taskInput").value=""
    saveDB()
}

function toggleTask(id){
    let t=DB.tasks.find(x=>x.id==id)
    t.done=!t.done
    saveDB()
}

function deleteTask(id){
    DB.tasks=DB.tasks.filter(x=>x.id!=id)
    saveDB()
}

function renderTasks(){
    let html=""
    DB.tasks.forEach(t=>{
        html+=`
        <div class="task ${t.done?'completed':''}">
            ${t.text}
            <div>
                <button onclick="toggleTask(${t.id})">✔</button>
                <button onclick="deleteTask(${t.id})">🗑</button>
            </div>
        </div>`
    })
    taskList.innerHTML=html
}

/* ===============================
   PROJECTS
================================ */
function addProject(){
    let text=projectInput.value
    if(!text)return
    DB.projects.push({id:Date.now(),name:text})
    projectInput.value=""
    saveDB()
}

function renderProjects(){
    projectList.innerHTML=DB.projects.map(p=>
        `<div class="task">${p.name}</div>`).join("")
}

/* ===============================
   NOTES
================================ */
function saveNote(){
    let text=noteInput.value
    if(!text)return
    DB.notes.push({id:Date.now(),text})
    noteInput.value=""
    saveDB()
}

function renderNotes(){
    notesList.innerHTML=DB.notes.map(n=>
        `<div class="task">${n.text}</div>`).join("")
}

/* ===============================
   STATS
================================ */
function renderStats(){
    stats.innerHTML=`
    Tasks: ${DB.tasks.length}<br>
    Completed: ${DB.tasks.filter(t=>t.done).length}<br>
    Projects: ${DB.projects.length}<br>
    Notes: ${DB.notes.length}`
}

function renderAll(){
    renderTasks()
    renderProjects()
    renderNotes()
    renderStats()
}
renderAll()

/* ===============================
   EXPORT / IMPORT
================================ */
function exportData(){
    let blob=new Blob([JSON.stringify(DB)],{type:"application/json"})
    let a=document.createElement("a")
    a.href=URL.createObjectURL(blob)
    a.download="focusflow_backup.json"
    a.click()
}

function importData(){
    let input=document.createElement("input")
    input.type="file"
    input.onchange=e=>{
        let file=e.target.files[0]
        let reader=new FileReader()
        reader.onload=()=>{DB=JSON.parse(reader.result);saveDB()}
        reader.readAsText(file)
    }
    input.click()
}

/* ===============================
   DARK MODE
================================ */
function toggleDark(){
    if(document.body.style.background=="white"){
        document.body.style.background="#0f172a"
        document.body.style.color="white"
    }else{
        document.body.style.background="white"
        document.body.style.color="black"
    }
}

/* ===============================
   PWA MANIFEST GENERATION
================================ */
const manifest={
    name:"FocusFlow",
    short_name:"FocusFlow",
    start_url:".",
    display:"standalone",
    background_color:"#020617",
    theme_color:"#020617",
    icons:[{
        src:"https://cdn-icons-png.flaticon.com/512/3062/3062634.png",
        sizes:"512x512",
        type:"image/png"
    }]
}
const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"})
document.getElementById("manifestPlaceholder").href=URL.createObjectURL(blob)

/* ===============================
   SERVICE WORKER INLINE 😎
================================ */
if("serviceWorker" in navigator){
    const swCode=`
        const CACHE="focusflow-v1";
        self.addEventListener("install",e=>{
            self.skipWaiting();
            e.waitUntil(
                caches.open(CACHE).then(cache=>cache.addAll(["./"]))
            );
        });
        self.addEventListener("fetch",e=>{
            e.respondWith(
                caches.match(e.request).then(res=>res||fetch(e.request))
            );
        });
    `;
    const blob=new Blob([swCode],{type:"text/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(blob));
}

/* ===============================
   INSTALL PROMPT
================================ */
let deferredPrompt;
window.addEventListener("beforeinstallprompt",e=>{
    e.preventDefault();
    deferredPrompt=e;
    setTimeout(()=>{
        if(confirm("Installer l'app ?")){
            deferredPrompt.prompt();
        }
    },3000);
})
</script>

</body>
</html>

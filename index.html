<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AlterTrack Pro</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a3a5c">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root {
  --cream:#f8f5ef; --white:#fff; --ink:#1a1a1a; --ink2:#3d3d3d; --muted:#8a8a8a;
  --border:#d8d2c8; --bl:#ece8e0; --accent:#1a3a5c; --gold:#c9932a;
  --al:#e8f0f8; --green:#2d6a4f; --gbg:#eaf4ef; --red:#8b2020; --rbg:#fdf0f0;
  --yellow:#8a6200; --ybg:#fdf8e8; --r:4px; --rl:8px; --sh:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--cream); color: var(--ink); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; font-size: 14px; }

/* TOPBAR ORIGINALE */
.topbar { background: var(--accent); color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 12px; }
.logo::after { content: 'PRO'; font-family: 'IBM Plex Mono', monospace; font-size: .6rem; background: var(--gold); padding: 2px 7px; border-radius: 2px; letter-spacing: 2px; color: #fff; }

.btn-exp { padding: 7px 15px; border-radius: var(--r); font-family: 'IBM Plex Sans', sans-serif; font-size: .76rem; font-weight: 600; cursor: pointer; border: 1px solid rgba(255,255,255,.3); background: transparent; color: #fff; transition: all .2s; }
.btn-exp.gold { background: var(--gold); border-color: var(--gold); margin-left: 8px; }

/* PAGE HEADER */
.ph { background: var(--white); border-bottom: 1px solid var(--border); padding: 26px 48px 18px; }
.ph h1 { font-family: 'Playfair Display', serif; font-size: 1.75rem; font-weight: 700; margin-bottom: 3px; }
.ph p { font-size: .8rem; color: var(--muted); font-weight: 300; }

/* STATS AVEC BARRES */
.stats { display: flex; background: var(--white); border-bottom: 1px solid var(--border); overflow-x: auto; }
.si { flex: 1; padding: 15px 22px; border-right: 1px solid var(--bl); position: relative; min-width: 120px; }
.sl { font-size: .67rem; text-transform: uppercase; letter-spacing: 1.8px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
.sv { font-family: 'Playfair Display', serif; font-size: 1.85rem; font-weight: 700; line-height: 1; }
.sb { position: absolute; bottom: 0; left: 0; height: 2px; transition: width .5s; }

/* LAYOUT */
.layout { display: grid; grid-template-columns: 310px 1fr; min-height: calc(100vh - 168px); }

/* SIDEBAR */
.sidebar { background: var(--white); border-right: 1px solid var(--border); padding: 22px; position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto; }
.fg { margin-bottom: 12px; }
label { display: block; font-size: .69rem; font-weight: 600; color: var(--ink2); text-transform: uppercase; margin-bottom: 3px; }
input, select { width: 100%; border: 1px solid var(--border); border-radius: var(--r); color: var(--ink); font-size: .83rem; padding: 10px; background: var(--cream); outline: none; }
.btn-add { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: var(--r); font-weight: 600; cursor: pointer; margin-top: 10px; }

/* TABLEAU & CARTES MOBILE */
.content { padding: 22px 26px; }
.tw { background: var(--white); border: 1px solid var(--border); border-radius: var(--rl); overflow: hidden; box-shadow: var(--sh); }
table { width: 100%; border-collapse: collapse; }
thead { background: var(--accent); color: #fff; }
th { padding: 12px; text-align: left; font-size: .64rem; text-transform: uppercase; letter-spacing: 1.4px; }
td { padding: 12px; border-bottom: 1px solid var(--bl); font-size: .82rem; }

.st-select { font-size: 0.75rem; padding: 4px; border-radius: 4px; border: 1px solid var(--border); background: var(--white); cursor: pointer; font-weight: 500; width: 100%; }
.st-select.accepte { background: var(--gbg); color: var(--green); border-color: #90d0a8; }
.st-select.attente { background: var(--ybg); color: var(--yellow); border-color: #e8d090; }
.st-select.refuse { background: var(--rbg); color: var(--red); border-color: #e0a0a0; }

.link-btn { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 4px; }

@media (max-width: 850px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border); padding: 20px; }
  .ph { padding: 20px; }
  .content { padding: 15px; }
  thead { display: none; }
  tbody tr { display: block; border-bottom: 8px solid var(--cream); padding: 15px; background: #fff; }
  td { display: block; padding: 6px 0; border: none; }
  td:before { content: attr(data-label); font-size: 10px; color: var(--muted); display: block; text-transform: uppercase; font-weight: 700; margin-bottom: 2px; }
}

.toast { position: fixed; bottom: 22px; right: 22px; background: var(--accent); color: #fff; padding: 12px 20px; border-radius: var(--r); font-size: .8rem; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">AlterTrack</div>
  <div>
    <button class="btn-exp" onclick="document.getElementById('file-input').click()">📁 Import Excel</button>
    <button class="btn-exp gold" onclick="exportExcel()">⬇ Export</button>
  </div>
  <input type="file" id="file-input" hidden accept=".xlsx, .xls, .csv">
</div>

<div class="ph">
  <h1>Suivi Alternance 2026</h1>
  <p>Gestionnaire intelligent pour BTS SAM Marseille</p>
</div>

<div class="stats">
  <div class="si"><div class="sl">Total</div><div class="sv" id="sT">0</div><div class="sb" style="background:var(--accent);width:100%"></div></div>
  <div class="si"><div class="sl">En attente</div><div class="sv" id="sA" style="color:var(--yellow)">0</div><div class="sb" id="bA" style="background:var(--yellow)"></div></div>
  <div class="si"><div class="sl">Succès</div><div class="sv" id="sAc" style="color:var(--green)">0</div><div class="sb" id="bAc" style="background:var(--green)"></div></div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="fg"><label>Entreprise</label><input id="fe" placeholder="ex: CMA CGM"></div>
    <div class="fg"><label>Poste</label><input id="fp" placeholder="ex: Assistant de direction"></div>
    <div class="fg"><label>Lien de l'offre</label><input id="fl" placeholder="https://..."></div>
    <div class="fg"><label>Statut</label>
      <select id="fs">
        <option value="attente">⏳ En attente</option>
        <option value="accepte">✅ Acceptée</option>
        <option value="refuse">❌ Refusée</option>
      </select>
    </div>
    <button class="btn-add" onclick="add()">+ Ajouter</button>
  </div>

  <div class="content">
    <div class="tw">
      <table>
        <thead>
          <tr><th>Entreprise</th><th>Poste</th><th>Lien</th><th>Statut</th><th style="text-align:right">Action</th></tr>
        </thead>
        <tbody id="tb"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast" class="toast">Action réussie</div>

<script>
const KEY = 'altertrack_sam_vfinal';
let db = [];

function load() { 
  db = JSON.parse(localStorage.getItem(KEY)) || []; 
  render(); stats(); 
}

function save() { 
  localStorage.setItem(KEY, JSON.stringify(db)); 
}

function add() {
  const e = document.getElementById('fe').value.trim();
  const p = document.getElementById('fp').value.trim();
  const l = document.getElementById('fl').value.trim();
  if(!e || !p) return;
  db.unshift({ id: Date.now().toString(36), ent: e, pos: p, link: l, st: document.getElementById('fs').value });
  save(); render(); stats();
  document.getElementById('fe').value = ''; document.getElementById('fp').value = ''; document.getElementById('fl').value = '';
  showToast("Ajouté");
}

function updateStatus(id, newStatus) {
  const item = db.find(i => i.id === id);
  if(item) {
    item.st = newStatus;
    save(); render(); stats();
    showToast("Statut mis à jour");
  }
}

function del(id) {
  if(confirm("Supprimer ?")) { 
    db = db.filter(i => i.id !== id); 
    save(); render(); stats(); 
    showToast("Supprimé");
  }
}

function render() {
  const tb = document.getElementById('tb');
  if(db.length === 0) {
    tb.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px; color:#aaa;">Rien ici. Importe ton Excel !</td></tr>';
    return;
  }
  tb.innerHTML = db.map(i => `
    <tr>
      <td data-label="Entreprise"><strong>${i.ent}</strong></td>
      <td data-label="Poste">${i.pos}</td>
      <td data-label="Lien">${i.link ? `<a href="${i.link}" target="_blank" class="link-btn">🔗 Voir</a>` : '-'}</td>
      <td data-label="Statut">
        <select class="st-select ${i.st}" onchange="updateStatus('${i.id}', this.value)">
          <option value="attente" ${i.st === 'attente' ? 'selected' : ''}>⏳ Attente</option>
          <option value="accepte" ${i.st === 'accepte' ? 'selected' : ''}>✅ Succès</option>
          <option value="refuse" ${i.st === 'refuse' ? 'selected' : ''}>❌ Refusé</option>
        </select>
      </td>
      <td data-label="Action" style="text-align:right">
        <button onclick="del('${i.id}')" style="background:none; border:none; color:var(--red); font-weight:600; cursor:pointer;">Suppr.</button>
      </td>
    </tr>
  `).join('');
}

function stats() {
  const total = db.length;
  const att = db.filter(i => i.st === 'attente').length;
  const acc = db.filter(i => i.st === 'accepte').length;
  document.getElementById('sT').textContent = total;
  document.getElementById('sA').textContent = att;
  document.getElementById('sAc').textContent = acc;
  if(total > 0) {
    document.getElementById('bA').style.width = (att/total*100) + '%';
    document.getElementById('bAc').style.width = (acc/total*100) + '%';
  }
}

// IMPORTATION ROBUSTE (OPTIMISÉE MOBILE)
document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const dataArr = new Uint8Array(e.target.result);
      const workbook = XLSX.read(dataArr, {type: 'array'});
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval: ""});
      let added = 0;
      rows.forEach(row => {
        const entreprise = row['Entreprise'] || row['entreprise'] || row['Nom'];
        const poste = row['Intitulé du Poste'] || row['Poste visé'] || row['Poste'];
        const lien = row['Lien'] || row['URL'] || "";
        if(entreprise && entreprise !== "Entreprise") { 
          db.push({ id: Math.random().toString(36).substr(2, 9), ent: entreprise, pos: poste || "À préciser", link: lien, st: 'attente' });
          added++;
        }
      });
      if(added > 0) { save(); render(); stats(); showToast(`${added} lignes importées !`); }
    } catch(err) { alert("Erreur de lecture du fichier."); }
  };
  reader.readAsArrayBuffer(file);
});

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function exportExcel() {
  const ws = XLSX.utils.json_to_sheet(db);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Suivi");
  XLSX.writeFile(wb, "Mon_Suivi_Alternance.xlsx");
}

window.onload = load;
</script>
</body>
</html>
